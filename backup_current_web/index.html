<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="The Grand IPA Archive - Archiving Every Delisted iOS App from the most well known to the most Obscure">
    <meta name="keywords" content="iOS, app archive, IPA, iOS apps, app icons, download, iOS software, iOS games, iOS app collection, legacy apps, iOS archive, IPA archive">
    <meta property="og:title" content="The Grand IPA Archive">
    <meta property="og:image" content="apple-touch-icon.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>The Grand IPA Archive</title>
    <link rel="icon" href="apple-touch-icon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Glossy Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="card-icon-glossy" style="width: 44px; height: 44px; border-radius: 10px; margin: 0 12px 0 0;">
                    <img src="apple-touch-icon.png" alt="Logo">
                </div>
                <div class="header-text">
                    <h1>The Grand IPA Archive</h1>
                    <div id="statsBar" class="stats-bar">Loading database...</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="random-btn-header" onclick="randomIPA()"><i class="fa fa-refresh"></i> Random</button>
            </div>
        </div>
    </header>
    
    <!-- Search & Filter Container -->
    <div class="main-search-wrapper">
        <form id="searchForm" class="ios-form" onsubmit="event.preventDefault(); applyFilters();">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Search apps..." class="ios-input main-search">
                <button type="submit" class="ios-btn-blue">Search</button>
            </div>
            <div class="filter-grid">
                <div class="filter-item">
                    <label>Bundle ID</label>
                    <input type="text" id="bundleid" placeholder="com.gameloft." class="ios-input">
                </div>
                <div class="filter-item">
                    <label>Min OS</label>
                    <input type="text" id="minos" placeholder="1.0" class="ios-input">
                </div>
                <div class="filter-item">
                    <label>Max OS</label>
                    <input type="text" id="maxos" placeholder="5.1.1" class="ios-input">
                </div>
                <div class="filter-item">
                    <label>Device</label>
                    <div class="ios-segmented-control" id="deviceSegments">
                        <button type="button" class="segment active" data-value="">Any</button>
                        <button type="button" class="segment" data-value="2" title="iPhone"><i class="fa fa-mobile"></i></button>
                        <button type="button" class="segment" data-value="4" title="iPad"><i class="fa fa-tablet"></i></button>
                    </div>
                    <input type="hidden" id="device" value="">
                </div>
                <div class="filter-item checkbox-item">
                    <label for="unique">Unique</label>
                    <input type="checkbox" id="unique" checked>
                </div>
            </div>
        </form>
    </div>

    <!-- Results Area -->
    <div id="resultsContainer" class="results-grid">
        <div id="searchResultCount" class="result-count-glossy" style="display: none;"></div>
        <div class="search-empty-state" id="searchEmptyState">
            <i class="fa fa-search search-icon"></i>
            <p class="search-message">Enter criteria to start searching</p>
        </div>
        <div id="searchResults" class="app-grid"></div>
        <div id="pagination" class="ios-pagination"></div>
    </div>
    
    <!-- Modal Container -->
    <div id="modalContainer"></div>
    
    <script src="script.js"></script>
</body>
</html>
